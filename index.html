<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="apple-mobile-web-app-title" content="Nimbus"/>
<meta name="theme-color" content="#0d2440"/>
<link rel="manifest" href="manifest.json"/>
<link rel="apple-touch-icon" href="icon-192.png"/>
<title>Nimbus Weather</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f5f5f0;color:#1a1a1a;min-height:100vh;padding-top:env(safe-area-inset-top);padding-bottom:env(safe-area-inset-bottom)}
.app{max-width:700px;margin:0 auto;background:#fff;min-height:100vh;border-left:1px solid #e5e5e0;border-right:1px solid #e5e5e0}
button{cursor:pointer;font-family:inherit}
input{font-family:inherit;font-size:16px;padding:12px 14px;border:1px solid #ddd;border-radius:10px;outline:none;width:100%;min-height:48px}
input:focus{border-color:#0d2440}
input[type=time]{min-height:44px;font-size:15px}
.badge{display:inline-block;border-radius:6px;padding:3px 9px;font-size:12px;white-space:nowrap;border:1px solid}
.badge-clear{background:#eaf3de;border-color:#b0d070;color:#3b6d11}
.badge-cloud{background:#f1efe8;border-color:#b4b2a9;color:#5f5e5a}
.badge-rain{background:#e6f1fb;border-color:#85b7eb;color:#185fa5}
.badge-storm{background:#fcebeb;border-color:#f09595;color:#a32d2d}
.badge-snow{background:#e6f1fb;border-color:#85b7eb;color:#185fa5}
.badge-success{background:#eaf3de;border-color:#b0d070;color:#3b6d11}
.badge-warn{background:#faeeda;border-color:#ef9f27;color:#854f0b}
.badge-danger{background:#fcebeb;border-color:#f09595;color:#a32d2d}
.badge-info{background:#e6f1fb;border-color:#85b7eb;color:#185fa5}
.badge-muted{background:#f1efe8;border-color:#b4b2a9;color:#5f5e5a}
.badge-active{background:#d1fae5;border-color:#34d399;color:#065f46}
.badge-upcoming{background:#dbeafe;border-color:#93c5fd;color:#1e40af}
.badge-completed{background:#f1efe8;border-color:#b4b2a9;color:#5f5e5a}
.day-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:10px}
.day-card{border:1px solid #e5e5e0;border-radius:14px;padding:16px;cursor:pointer;background:#fff;transition:border-color .15s;-webkit-tap-highlight-color:transparent}
.day-card.sel{border-color:#378add;background:#e6f1fb}
.hourly-row{display:flex;gap:10px;overflow-x:auto;padding-bottom:10px;-webkit-overflow-scrolling:touch}
.hour-card{flex-shrink:0;min-width:90px;border:1px solid #e5e5e0;border-radius:14px;padding:12px 10px;text-align:center;background:#f5f5f0}
.hour-card.rainy{background:#e6f1fb;border-color:#85b7eb}
.hour-card.daytrip{background:#fef3c7;border-color:#fbbf24}
.tag{border-radius:50px;padding:8px 16px;font-size:14px;border:1px solid}
.alert-box{border-radius:10px;padding:12px 16px;margin-bottom:1rem;font-size:14px}
.alert-info{background:#e6f1fb;border:1px solid #85b7eb;color:#185fa5}
.summary-table{width:100%;border-collapse:collapse;font-size:13px;table-layout:fixed}
.summary-table th{text-align:center;padding:10px 8px;font-size:11px;text-transform:uppercase;letter-spacing:.05em;color:#888;font-weight:500;border-bottom:1px solid #e5e5e0;background:#f5f5f0}
.summary-table th:first-child{text-align:left;padding-left:12px}
.summary-table td{padding:11px 8px;border-bottom:1px solid #e5e5e0;text-align:center;color:#555}
.summary-table td:first-child{text-align:left;padding-left:12px;color:#1a1a1a}
.summary-table tr:nth-child(even) td{background:#fafaf8}
.summary-table tr:hover td{background:#f0f0ea;cursor:pointer}
.loading-pulse{color:#888;font-size:14px;padding:2rem;text-align:center;background:#f5f5f0;border-radius:12px;border:1px solid #e5e5e0}
.mode-toggle{display:flex;gap:2px;background:#f5f5f0;border-radius:12px;padding:3px;border:1px solid #e5e5e0}
.mode-btn{padding:8px 12px;border-radius:9px;border:1px solid transparent;background:transparent;font-size:13px;color:#888;transition:all .15s;white-space:nowrap;min-height:40px}
.mode-btn.on{background:#fff;border-color:#ddd;color:#1a1a1a;font-weight:500}
.right-now{border-radius:14px;padding:16px 18px;margin-bottom:1rem}
.offline-bar{display:none;background:#faeeda;border-bottom:1px solid #ef9f27;padding:10px 1rem;font-size:13px;color:#854f0b;text-align:center}
.trip-card{border:1px solid #e5e5e0;border-radius:16px;padding:1.25rem;margin-bottom:12px;background:#fff;transition:border-color .15s;-webkit-tap-highlight-color:transparent}
.city-chip{display:inline-block;background:#f5f5f0;border:1px solid #e5e5e0;border-radius:50px;padding:4px 12px;font-size:13px;color:#555;margin:2px}
.edit-city-row{border:1px solid #e5e5e0;border-radius:14px;margin-bottom:10px;overflow:hidden;background:#fff}
.edit-city-hdr{display:flex;align-items:center;gap:8px;padding:14px 14px}
.edit-city-form{padding:16px;border-top:1px solid #e5e5e0;background:#fafaf8}
.icon-btn{width:42px;height:42px;border-radius:10px;border:1px solid #e5e5e0;background:#fff;font-size:16px;display:inline-flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0;-webkit-tap-highlight-color:transparent}
.icon-btn:active{background:#f5f5f0}
.icon-btn.del:active{background:#fcebeb;border-color:#f09595;color:#a32d2d}
.fl2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.flabel{display:block;font-size:12px;color:#888;text-transform:uppercase;letter-spacing:.05em;margin-bottom:6px;font-weight:500}
.dt-row{display:flex;gap:8px;align-items:flex-start;margin-bottom:12px}
.srch-wrap{position:relative}
.srch-dd{display:none;position:absolute;left:0;right:0;top:calc(100% + 4px);background:#fff;border:1px solid #ddd;border-radius:10px;z-index:50;overflow:hidden;box-shadow:0 4px 16px rgba(0,0,0,.12)}
.srch-item{padding:14px 16px;font-size:15px;color:#1a1a1a;cursor:pointer;border-bottom:1px solid #f0f0ea}
.srch-item:last-child{border-bottom:none}
.srch-item:active{background:#f0f0ea}
.srch-sub{font-size:12px;color:#888;margin-top:2px}
.srch-empty{padding:14px 16px;font-size:14px;color:#aaa;font-style:italic}
.travel-divider{display:flex;align-items:center;gap:10px;margin:14px 0;font-size:12px;color:#888}
.travel-divider-line{flex:1;height:1px;background:#e5e5e0}
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.45);display:flex;align-items:center;justify-content:center;z-index:100;padding:1rem}
.modal-box{background:#fff;border-radius:18px;padding:1.5rem;width:100%;max-width:360px}
</style>
</head>
<body>
<div class="app">
  <div class="offline-bar" id="offlineBar">Offline — showing cached data.</div>
  <div id="root"></div>
</div>
<script>
var OWM_KEY='1c78c3cb1f46e28d4bb0300b8d82e127';
var screen='home',trips=[],currentTripId=null;
var sel=0,dayI=0,mode='pack',tab='city';
var editOpen=null,showModal=false,CITIES=[];
var srchTimers={},srchSelections={},dtRowCtr=0;

/* ── Offline ── */
window.addEventListener('online',function(){document.getElementById('offlineBar').style.display='none';});
window.addEventListener('offline',function(){document.getElementById('offlineBar').style.display='block';});
if(!navigator.onLine)document.getElementById('offlineBar').style.display='block';

/* ── Persistence ── */
function loadTrips(){try{trips=JSON.parse(localStorage.getItem('tw_trips')||'[]');}catch(e){trips=[];}}
function saveTrips(){try{localStorage.setItem('tw_trips',JSON.stringify(trips));}catch(e){}}
function getTrip(){return trips.find(function(t){return t.id===currentTripId;})||null;}
function cacheKey(tid,def){return'tw_w_'+tid+'_'+def.name+'_'+def.from;}
function saveWCache(i){
  var trip=getTrip();if(!trip)return;
  var c=CITIES[i],def=trip.cityDefs[i];
  try{localStorage.setItem(cacheKey(currentTripId,def),JSON.stringify({lat:c.lat,lon:c.lon,aqi:c.aqi,current:c.current,daily:c.daily,hourly:c.hourly,hourlyByDate:c.hourlyByDate,dayTripHourly:c.dayTripHourly,pack:c.pack,conf:c.conf,ts:Date.now()}));}catch(e){}
}
function loadWCache(tid,def){try{return JSON.parse(localStorage.getItem(cacheKey(tid,def))||'null');}catch(e){return null;}}

/* ── Search autocomplete ── */
function srchInput(inputId,ddId){
  clearTimeout(srchTimers[inputId]);
  var val=(document.getElementById(inputId)||{}).value||'';
  if(val.length<2){hideDd(ddId);return;}
  srchTimers[inputId]=setTimeout(function(){doSearch(inputId,ddId);},350);
}
async function doSearch(inputId,ddId){
  var val=(document.getElementById(inputId)||{}).value||'';
  if(val.length<2){hideDd(ddId);return;}
  var dd=document.getElementById(ddId);if(!dd)return;
  dd.innerHTML='<div class="srch-empty">Searching…</div>';dd.style.display='block';
  try{
    var r=await fetch('https://api.openweathermap.org/geo/1.0/direct?q='+encodeURIComponent(val)+'&limit=5&appid='+OWM_KEY);
    var results=await r.json();
    if(!results||!results.length){dd.innerHTML='<div class="srch-empty">No results — try adding country name</div>';return;}
    dd.innerHTML=results.map(function(res){
      var sub=(res.state?res.state+', ':'')+res.country;
      var latS=res.lat.toFixed(4),lonS=res.lon.toFixed(4);
      var nameE=res.name.replace(/'/g,'\u2019'),ctryE=(res.country||'').replace(/'/g,'\u2019'),stateE=(res.state||'').replace(/'/g,'\u2019');
      return '<div class="srch-item" onclick="pickResult(\''+inputId+'\',\''+ddId+'\',\''+nameE+'\',\''+stateE+'\',\''+ctryE+'\','+res.lat+','+res.lon+')">'
        +'<div>'+res.name+'</div><div class="srch-sub">'+sub+' &nbsp;·&nbsp; <span style="font-family:monospace;font-size:11px">'+latS+'°, '+lonS+'°</span></div></div>';
    }).join('');
  }catch(e){dd.innerHTML='<div class="srch-empty">Search unavailable</div>';}
}
function pickResult(inputId,ddId,name,state,country,lat,lon){
  srchSelections[inputId]={lat:lat,lon:lon,name:name,country:country};
  var inp=document.getElementById(inputId);if(inp)inp.value=name;
  if(inputId==='nc_n'){var cf=document.getElementById('nc_co');if(cf)cf.value=country;}
  else if(inputId==='ec_n'){var cf=document.getElementById('ec_co');if(cf)cf.value=country;}
  hideDd(ddId);
}
function hideDd(ddId){var dd=document.getElementById(ddId);if(dd){dd.style.display='none';dd.innerHTML='';}}
document.addEventListener('click',function(e){
  if(!e.target.closest('.srch-wrap')&&!e.target.closest('.srch-dd')){
    document.querySelectorAll('.srch-dd').forEach(function(d){d.style.display='none';});
  }
});

/* ── Utilities ── */
function fmtRange(f,t){
  var fd=new Date(f+'T12:00'),td=new Date(t+'T12:00');
  var mo=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  return mo[fd.getMonth()]+' '+fd.getDate()+'–'+td.getDate();
}
function fmtDate(s){
  var d=new Date(s+'T12:00'),dn=['Sun','Mon','Tue','Wed','Thu','Fri','Sat'],mo=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  return dn[d.getDay()]+' '+mo[d.getMonth()]+' '+d.getDate();
}
function fmtTime(t){
  if(!t)return'';
  var p=t.split(':'),h=parseInt(p[0]),m=p[1],ampm=h>=12?'PM':'AM';
  h=h%12||12;return h+':'+m+' '+ampm;
}
function fmtTimeH(t){
  // Hour-only display — e.g. "8 AM", "6 PM"
  if(!t)return'';
  var h=parseInt(t.split(':')[0]),ampm=h>=12?'PM':'AM';
  h=h%12||12;return h+' '+ampm;
}
function wmo(c){
  if(c===0)return'Clear';if(c<=2)return c===1?'Mostly Clear':'Partly Cloudy';if(c===3)return'Overcast';
  if(c<=48)return'Foggy';if(c<=55)return'Drizzle';if(c<=65)return'Rain';if(c<=77)return'Snow';
  if(c<=82)return'Rain Showers';if(c<=99)return'Thunderstorm';return'Cloudy';
}
function owmCond(w){
  var m=w[0].main,d=w[0].description;
  if(m==='Clear')return'Clear';
  if(m==='Clouds')return d.includes('few')||d.includes('scattered')?'Partly Cloudy':d.includes('broken')?'Mostly Cloudy':'Overcast';
  if(m==='Rain'||m==='Drizzle')return'Rain';if(m==='Thunderstorm')return'Thunderstorm';return m;
}
function cc(c){
  if(c==='Clear'||c==='Mostly Clear')return'badge-clear';
  if(c==='Rain'||c==='Rain Showers'||c==='Drizzle')return'badge-rain';
  if(c==='Thunderstorm')return'badge-storm';if(c==='Snow')return'badge-snow';return'badge-cloud';
}
function bdg(t,c){return'<span class="badge '+c+'">'+t+'</span>';}
function confB(c){return c==='high'?bdg('Reliable','badge-success'):c==='medium'?bdg('May change','badge-warn'):bdg('Check closer','badge-danger');}
function aqiB(a){if(a==null)return'';var L=['Good','Fair','Moderate','Poor','Very Poor'],C=['badge-success','badge-success','badge-warn','badge-danger','badge-danger'];return bdg('AQI: '+L[a-1],C[a-1]||'badge-muted');}
function confFromDate(f){var d=Math.round((new Date(f+'T12:00')-new Date())/86400000);return d<=7?'high':d<=14?'medium':'low';}
var CP=[{a:'#dbeafe',b:'#3b82f6',c:'#1e40af'},{a:'#fee2e2',b:'#f87171',c:'#991b1b'},{a:'#d1fae5',b:'#34d399',c:'#065f46'},{a:'#fef3c7',b:'#fbbf24',c:'#92400e'}];

function renderHourCards(hours,style){
  if(!hours||!hours.length)return'';
  var h='<div class="hourly-row">';
  hours.forEach(function(hr){
    var isR=hr.rain>=60;
    var cls='hour-card'+(style==='daytrip'?' daytrip':(isR?' rainy':''));
    h+='<div class="'+cls+'">';
    h+='<div style="font-size:12px;color:#888;margin-bottom:7px">'+hr.t+'</div>'+bdg(hr.cond,cc(hr.cond));
    h+='<div style="font-size:22px;font-weight:600;color:#1a1a1a;margin-top:10px">'+hr.temp+'°</div>';
    h+='<div style="font-size:12px;color:#888">feels '+hr.fl+'°</div>';
    h+='<div style="font-size:12px;color:'+(isR?'#185fa5':'#888')+';margin-top:5px">'+hr.rain+'% rain</div>';
    h+='</div>';
  });
  return h+'</div>';
}
function travelDivider(icon,text){
  return '<div class="travel-divider"><div class="travel-divider-line"></div><span>'+icon+' '+text+'</span><div class="travel-divider-line"></div></div>';
}

/* ── Init ── */
function init(){
  loadTrips();
  if(!trips.length){
    trips.push({id:'tw_1',name:'Europe Spring 2026',created:Date.now(),cityDefs:[
      {id:'c1',name:'Paris',country:'France',lat:48.8566,lon:2.3522,from:'2026-04-20',to:'2026-04-23',arrivalTime:'',dayTrips:[{name:'Mont-Saint-Michel',date:'2026-04-21',lat:48.6360,lon:-1.5115,departTime:'08:00',returnTime:'18:00'}]},
      {id:'c2',name:'London',country:'UK',lat:51.5085,lon:-0.1257,from:'2026-04-24',to:'2026-04-27',arrivalTime:'14:00',dayTrips:[]},
      {id:'c3',name:'Amsterdam',country:'Netherlands',lat:52.3676,lon:4.9041,from:'2026-04-28',to:'2026-04-30',arrivalTime:'11:00',dayTrips:[{name:'Keukenhof Gardens',date:'2026-04-29',lat:52.2697,lon:4.5469,departTime:'09:30',returnTime:'17:00'}]},
      {id:'c4',name:'Brussels',country:'Belgium',lat:50.8503,lon:4.3517,from:'2026-05-01',to:'2026-05-03',arrivalTime:'13:00',dayTrips:[]}
    ]});
    saveTrips();
  }
  render();
}

/* ── Trip helpers ── */
function tripStatus(trip){
  if(!trip.cityDefs.length)return'empty';
  var now=new Date(),f=new Date(trip.cityDefs[0].from+'T00:00'),l=new Date(trip.cityDefs[trip.cityDefs.length-1].to+'T23:59');
  return now<f?'upcoming':now>l?'completed':'active';
}
function tripRange(trip){
  if(!trip.cityDefs.length)return'No cities yet';
  var mo=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  var f=new Date(trip.cityDefs[0].from+'T12:00'),l=new Date(trip.cityDefs[trip.cityDefs.length-1].to+'T12:00');
  return mo[f.getMonth()]+' '+f.getDate()+' – '+mo[l.getMonth()]+' '+l.getDate()+', '+l.getFullYear();
}

/* ── Open trip ── */
function openTrip(id){
  currentTripId=id;sel=0;dayI=0;mode='pack';tab='city';editOpen=null;
  var trip=trips.find(function(t){return t.id===id;});
  CITIES=trip.cityDefs.map(function(def){
    var wc=loadWCache(id,def);
    if(wc&&wc.daily&&wc.daily.length)return Object.assign({},def,{loading:false,error:null,sub:def.country+' · '+fmtRange(def.from,def.to)},wc);
    return Object.assign({},def,{loading:true,error:null,sub:def.country+' · '+fmtRange(def.from,def.to),aqi:null,current:null,daily:[],hourly:[],hourlyByDate:{},dayTripHourly:{},conf:'low',pack:[]});
  });
  screen='trip';render();
  CITIES.forEach(function(c,i){if(c.loading)loadWeather(i);});
}

/* ── Weather loading ── */
async function loadWeather(i){
  var trip=getTrip();if(!trip||!trip.cityDefs[i])return;
  var def=trip.cityDefs[i];
  try{
    var lat=def.lat,lon=def.lon;
    if(!lat||!lon){
      var co=await geo(def.name,def.country);
      lat=co.lat;lon=co.lon;
      trip.cityDefs[i].lat=lat;trip.cityDefs[i].lon=lon;saveTrips();
    }
    CITIES[i].lat=lat;CITIES[i].lon=lon;
    var res=await Promise.all([owmCur(lat,lon),owmAqi(lat,lon),meteo(lat,lon,def.from,def.to)]);
    var cur=res[0],aq=res[1],fc=res[2];
    CITIES[i].current={temp:Math.round(cur.main.temp),fl:Math.round(cur.main.feels_like),cond:owmCond(cur.weather),wind:Math.round(cur.wind.speed),humidity:cur.main.humidity,vis:Math.round(cur.visibility/160.934)/10+' mi'};
    CITIES[i].aqi=aq.list[0].main.aqi;
    var daily=[];
    fc.daily.time.forEach(function(date,di){
      var dt=def.dayTrips&&def.dayTrips.find(function(t){return t.date===date;});
      daily.push({d:fmtDate(date),dateStr:date,hi:Math.round(fc.daily.temperature_2m_max[di]),lo:Math.round(fc.daily.temperature_2m_min[di]),fl:Math.round(fc.daily.apparent_temperature_max[di]),cond:wmo(fc.daily.weathercode[di]),rain:fc.daily.precipitation_probability_max[di]||0,wind:Math.round(fc.daily.windspeed_10m_max[di]),tripName:dt?dt.name:null,tripDepart:dt?dt.departTime:null,tripReturn:dt?dt.returnTime:null});
    });
    CITIES[i].daily=daily;
    // Store hourly for ALL days (not just first day)
    var tH=[6,9,12,15,18,21],tL=['6am','9am','12pm','3pm','6pm','9pm'];
    var hourlyByDate={};
    fc.hourly.time.forEach(function(dt,hi){
      var p=dt.split('T'),date=p[0],hour=parseInt(p[1]);
      if(tH.includes(hour)){
        var idx=tH.indexOf(hour);
        if(!hourlyByDate[date])hourlyByDate[date]=[];
        hourlyByDate[date].push({t:tL[idx],hour:hour,temp:Math.round(fc.hourly.temperature_2m[hi]),fl:Math.round(fc.hourly.apparent_temperature[hi]),cond:wmo(fc.hourly.weathercode[hi]),rain:fc.hourly.precipitation_probability[hi]||0});
      }
    });
    CITIES[i].hourlyByDate=hourlyByDate;
    CITIES[i].hourly=hourlyByDate[def.from]||[];
    // Fetch weather at day trip locations for day trips that have coordinates + times
    var dayTripHourly={};
    if(def.dayTrips){
      for(var j=0;j<def.dayTrips.length;j++){
        var dtr=def.dayTrips[j];
        if(dtr.lat&&dtr.lon){
          try{
            var dtFc=await meteo(dtr.lat,dtr.lon,dtr.date,dtr.date);
            var dtH=[];
            dtFc.hourly.time.forEach(function(dt2,hi2){
              var p2=dt2.split('T'),hour2=parseInt(p2[1]);
              if(tH.includes(hour2)){var idx2=tH.indexOf(hour2);dtH.push({t:tL[idx2],hour:hour2,temp:Math.round(dtFc.hourly.temperature_2m[hi2]),fl:Math.round(dtFc.hourly.apparent_temperature[hi2]),cond:wmo(dtFc.hourly.weathercode[hi2]),rain:dtFc.hourly.precipitation_probability[hi2]||0});}
            });
            dayTripHourly[dtr.date]=dtH;
          }catch(e){}
        }
      }
    }
    CITIES[i].dayTripHourly=dayTripHourly;
    var pk=new Set(),mn=Math.min.apply(null,daily.map(function(d){return d.lo;})||[60]),mx=Math.max.apply(null,daily.map(function(d){return d.hi;})||[60]);
    if(daily.some(function(d){return d.rain>=50;})){pk.add('Rain jacket');pk.add('Umbrella');}
    if(mn<45){pk.add('Warm layers');pk.add('Gloves');}
    if(mn<55)pk.add('Light jacket');if(mx>65)pk.add('Sunscreen');if(mx>70)pk.add('Sunglasses');
    pk.add('Comfortable walking shoes');if(def.dayTrips&&def.dayTrips.length)pk.add('Day trip bag');
    CITIES[i].pack=Array.from(pk);
    CITIES[i].conf=confFromDate(def.from);CITIES[i].loading=false;CITIES[i].error=null;
    saveWCache(i);
  }catch(e){
    var wc=loadWCache(currentTripId,def);
    if(wc&&wc.daily){Object.assign(CITIES[i],wc,{loading:false,error:'Cached data from '+(wc.ts?new Date(wc.ts).toLocaleDateString():'')});}
    else{CITIES[i].loading=false;CITIES[i].error='Could not load weather.';}
  }
  if(screen==='trip')render();
}

/* ── API calls ── */
async function geo(name,country){
  var q=country?name+','+country:name;
  var r=await fetch('https://api.openweathermap.org/geo/1.0/direct?q='+encodeURIComponent(q)+'&limit=1&appid='+OWM_KEY);
  var d=await r.json();if(!d||!d.length)throw new Error('City not found: '+name);return{lat:d[0].lat,lon:d[0].lon};
}
async function owmCur(lat,lon){var r=await fetch('https://api.openweathermap.org/data/2.5/weather?lat='+lat+'&lon='+lon+'&appid='+OWM_KEY+'&units=imperial');return r.json();}
async function owmAqi(lat,lon){var r=await fetch('https://api.openweathermap.org/data/2.5/air_pollution?lat='+lat+'&lon='+lon+'&appid='+OWM_KEY);return r.json();}
async function meteo(lat,lon,from,to){
  var r=await fetch('https://api.open-meteo.com/v1/forecast?latitude='+lat+'&longitude='+lon+'&daily=temperature_2m_max,temperature_2m_min,apparent_temperature_max,precipitation_probability_max,windspeed_10m_max,weathercode&hourly=temperature_2m,apparent_temperature,precipitation_probability,weathercode&temperature_unit=fahrenheit&windspeed_unit=mph&timezone=auto&start_date='+from+'&end_date='+to);
  return r.json();
}

      h+=travelDivider('✈','Arrived in '+city.name+' · '+fmtTimeH(city.arrivalTime));
      if(afterArr0.length){h+='<div style="font-size:12px;color:#888;margin-bottom:6px">In '+city.name+'</div>';h+=renderHourCards(afterArr0,'');}
    }else if(activeDayTrip0&&deptHour0>=0){
      var beforeTrip0=allHourly0.filter(function(hr){return hr.hour<deptHour0;});
      var duringTrip0=(dtHourly0.length?dtHourly0:allHourly0).filter(function(hr){return hr.hour>=deptHour0&&hr.hour<retHour0;});
      var afterTrip0=allHourly0.filter(function(hr){return hr.hour>=retHour0;});
      h+='<div style="font-size:12px;color:#888;text-transform:uppercase;letter-spacing:.05em;margin-bottom:12px;font-weight:500">Hourly — '+sd0.d+'</div>';
      if(beforeTrip0.length){h+='<div style="font-size:12px;color:#888;margin-bottom:6px">In '+city.name+'</div>';h+=renderHourCards(beforeTrip0,'');}
      h+=travelDivider('🚌','Day trip to '+activeDayTrip0.name+(activeDayTrip0.departTime?' · Depart '+fmtTimeH(activeDayTrip0.departTime):''));
      h+=renderHourCards(duringTrip0,(dtHourly0.length?'daytrip':''));
      if(activeDayTrip0.returnTime&&afterTrip0.length){h+=travelDivider('🏠','Returned to '+city.name+' · '+fmtTimeH(activeDayTrip0.returnTime));h+=renderHourCards(afterTrip0,'');}
    }else if(allHourly0.length){
      h+='<div style="font-size:12px;color:#888;text-transform:uppercase;letter-spacing:.05em;margin-bottom:12px;font-weight:500">Hourly — '+sd0.d+'</div>';
      h+=renderHourCards(allHourly0,'');
    }
    h+='<div style="border-top:1px solid #e5e5e0;margin:1.5rem 0"></div>';
  }

  h+='<div style="font-size:12px;color:#888;text-transform:uppercase;letter-spacing:.05em;margin-bottom:10px;font-weight:500">Daily forecast</div>';
  h+='<div class="day-grid">';
  city.daily.forEach(function(d,i){
    var act=i===dayI;
    h+='<div class="day-card'+(act?' sel':'')+'" onclick="dayI='+i+';render()" style="'+(act?'background:'+cp.a+';border-color:'+cp.b:'')+'">';
    h+='<div style="font-size:13px;color:#888;margin-bottom:7px">'+d.d+'</div>'+bdg(d.cond,cc(d.cond));
    h+='<div style="font-size:26px;font-weight:600;color:#1a1a1a;margin-top:10px">'+d.hi+'°<span style="font-size:17px;color:#888">/'+d.lo+'°</span></div>';
    h+='<div style="font-size:13px;color:#888;margin-top:3px">Feels like '+d.fl+'°</div>';
    h+='<div style="font-size:13px;color:#185fa5;margin-top:7px">'+d.rain+'% rain · '+d.wind+' mph</div>';
    if(d.tripName){
      h+='<div style="margin-top:9px">'+bdg('Day trip: '+d.tripName,'badge-info')+'</div>';
      if(d.tripDepart||d.tripReturn)h+='<div style="font-size:11px;color:#888;margin-top:4px">'+(d.tripDepart?fmtTimeH(d.tripDepart):'?')+' – '+(d.tripReturn?fmtTimeH(d.tripReturn):'?')+'</div>';
    }
    h+='</div>';
  });
  h+='</div>';
  h+='<div style="border-top:1px solid #e5e5e0;margin:1.5rem 0"></div>';
  var sd=city.daily[dayI]||{};
  if(mode==='pack'){
    h+='<div style="font-size:12px;color:#888;text-transform:uppercase;letter-spacing:.05em;margin-bottom:12px;font-weight:500">Packing suggestions</div>';
    h+='<div style="display:flex;flex-wrap:wrap;gap:10px">';
    city.pack.forEach(function(item){h+='<span class="tag" style="background:'+cp.a+';border-color:'+cp.b+';color:'+cp.c+'">'+item+'</span>';});
    h+='</div>';
  }
  if(city.error&&city.daily.length)h+='<div style="margin-top:1rem;font-size:13px;color:#888;text-align:center">'+city.error+'</div>';
  h+='</div>';
  document.getElementById('root').innerHTML=h;
}

/* ── Summary ── */
function rSummary(){
  var trip=getTrip();
  var h='<div style="padding:1rem">';
  h+='<div style="font-size:17px;font-weight:500;margin-bottom:4px">'+trip.name+'</div>';
  h+='<div style="font-size:14px;color:#888;margin-bottom:1.25rem">'+tripRange(trip)+' · '+trip.cityDefs.length+' cities</div>';
  CITIES.forEach(function(city,ci){
    h+='<div style="margin-bottom:2rem">';
    h+='<div style="display:flex;align-items:center;gap:8px;margin-bottom:10px;flex-wrap:wrap">';
    h+='<div style="font-size:16px;font-weight:600">'+city.name+'</div>';
    h+='<div style="font-size:13px;color:#888">'+(city.sub||'')+(city.arrivalTime?' · Arrives '+fmtTime(city.arrivalTime):'')+'</div>';
    if(!city.loading){h+=aqiB(city.aqi)+' '+confB(city.conf);}
    h+='</div>';
    if(city.loading){h+='<div class="loading-pulse">Loading…</div></div>';return;}
    h+='<div style="overflow-x:auto;border:1px solid #e5e5e0;border-radius:12px">';
    h+='<table class="summary-table"><thead><tr><th style="width:26%">Day</th><th style="width:18%">Cond.</th><th>High</th><th>Low</th><th>Feels</th><th>Rain</th><th>Wind</th></tr></thead><tbody>';
    city.daily.forEach(function(d,di){
      var ir=d.rain>=60;
      h+='<tr onclick="tab=\'city\';sel='+ci+';dayI='+di+';render()">';
      h+='<td><div>'+d.d+'</div>'+(d.tripName?'<div style="margin-top:3px">'+bdg(d.tripName,'badge-info')+(d.tripDepart?' <span style="font-size:11px;color:#888">'+fmtTimeH(d.tripDepart)+' – '+fmtTimeH(d.tripReturn)+'</span>':'')+'</div>':'')+'</td>';
      h+='<td style="padding-left:4px;padding-right:4px">'+bdg(d.cond,cc(d.cond))+'</td><td style="font-weight:600;color:#1a1a1a">'+d.hi+'°</td>';
      h+='<td>'+d.lo+'°</td><td>'+d.fl+'°</td>';
      h+='<td style="color:'+(ir?'#185fa5':'#555')+'">'+d.rain+'%</td><td>'+d.wind+' mph</td></tr>';
    });
    h+='</tbody></table></div>';
    var rd=city.daily.filter(function(d){return d.rain>=60;}).length;
    if(rd)h+='<div style="margin-top:8px;font-size:13px;color:#185fa5">'+rd+' rainy day'+(rd>1?'s':'')+' in '+city.name+'</div>';
    h+='</div>';
  });
  h+='</div>';return h;
}

/* ── Edit screen ── */
function rEdit(){
  var trip=getTrip();if(!trip){screen='home';render();return;}
  var h='<div style="display:flex;align-items:center;gap:10px;padding:.875rem 1rem;border-bottom:1px solid #e5e5e0;background:#fff;position:sticky;top:0;z-index:10">';
  h+='<button onclick="screen=\'trip\';render()" style="padding:8px 12px;border-radius:10px;border:1px solid #e5e5e0;background:transparent;font-size:14px;color:#555;min-height:44px">← Back</button>';
  h+='<div style="font-size:16px;font-weight:600;color:#0d2440">Edit trip</div></div>';
  h+='<div style="padding:1rem">';
  h+='<div style="margin-bottom:1.5rem"><label class="flabel">Trip name</label>';
  h+='<input id="tnm" type="text" value="'+trip.name+'" onblur="renameTripOnBlur()" style="font-size:18px;font-weight:500"/></div>';
  h+='<div style="font-size:12px;color:#888;text-transform:uppercase;letter-spacing:.05em;margin-bottom:12px;font-weight:500">Cities ('+trip.cityDefs.length+')</div>';
  if(!trip.cityDefs.length)h+='<div style="font-size:15px;color:#aaa;text-align:center;padding:1.5rem 0;font-style:italic">No cities yet — add one below</div>';
  trip.cityDefs.forEach(function(def,i){
    var isOpen=editOpen===i;
    h+='<div class="edit-city-row"><div class="edit-city-hdr">';
    h+='<div style="display:flex;flex-direction:column;gap:4px;margin-right:4px">';
    h+='<button class="icon-btn" onclick="moveCity('+i+',-1)" style="font-size:14px'+(i===0?';opacity:.25;pointer-events:none':'')+'">↑</button>';
    h+='<button class="icon-btn" onclick="moveCity('+i+',1)" style="font-size:14px'+(i===trip.cityDefs.length-1?';opacity:.25;pointer-events:none':'')+'">↓</button>';
    h+='</div>';
    h+='<div style="flex:1;min-width:0">';
    h+='<div style="font-size:16px;font-weight:600;color:#1a1a1a">'+def.name+(def.country?' <span style="font-weight:400;color:#888;font-size:14px">'+def.country+'</span>':'')+'</div>';
    var subParts=[fmtRange(def.from,def.to)];
    if(def.arrivalTime)subParts.push('Arrives '+fmtTime(def.arrivalTime));
    if(def.dayTrips&&def.dayTrips.length)subParts.push(def.dayTrips.length+' day trip');
    h+='<div style="font-size:13px;color:#888;margin-top:2px">'+subParts.join(' · ')+'</div>';
    if(def.lat&&def.lon)h+='<div style="font-size:11px;color:#aaa;font-family:monospace;margin-top:2px">'+def.lat.toFixed(3)+'°, '+def.lon.toFixed(3)+'°</div>';
    h+='</div>';
    h+='<button class="icon-btn" onclick="toggleEdit('+i+')" style="color:#185fa5;border-color:#85b7eb;font-size:13px;width:auto;padding:0 12px;white-space:nowrap">'+(isOpen?'Done':'Edit')+'</button>';
    h+='<button class="icon-btn del" onclick="delCity('+i+')" title="Remove">✕</button>';
    h+='</div>';
    if(isOpen){
      h+='<div class="edit-city-form">';
      h+='<label class="flabel">City (search to confirm location)</label>';
      h+='<div class="srch-wrap" style="margin-bottom:10px">';
      h+='<input id="ec_n" type="text" value="'+def.name+'" oninput="srchInput(\'ec_n\',\'ec_n_dd\')" autocomplete="off" placeholder="Search city…"/>';
      h+='<div id="ec_n_dd" class="srch-dd"></div></div>';
      h+='<div class="fl2" style="margin-bottom:10px">';
      h+='<div><label class="flabel">Country</label><input id="ec_co" type="text" value="'+(def.country||'')+'"/></div>';
      h+='<div><div style="font-size:11px;color:#0d2440;font-weight:500;text-transform:uppercase;letter-spacing:.05em;margin-bottom:6px">📍 Coordinates</div>';
      h+='<div style="font-size:12px;color:#888;padding:12px 0">'+(def.lat&&def.lon?def.lat.toFixed(4)+'°, '+def.lon.toFixed(4)+'°':'Select from search')+'</div></div>';
      h+='</div>';
      h+='<div class="fl2" style="margin-bottom:10px">';
      h+='<div><label class="flabel">Arrival date</label><input id="ec_f" type="date" value="'+def.from+'"/></div>';
      h+='<div><label class="flabel">Departure date</label><input id="ec_t" type="date" value="'+def.to+'"/></div>';
      h+='</div>';
      h+='<div style="margin-bottom:14px"><label class="flabel">Arrival time <span style="font-weight:400;color:#aaa">(optional — when you arrive on first day)</span></label>';
      h+='<input id="ec_at" type="time" value="'+(def.arrivalTime||'')+'" style="max-width:180px"/></div>';
      h+='<label class="flabel" style="margin-bottom:10px">Day trips</label>';
      h+='<div id="dt_c">';
      if(def.dayTrips&&def.dayTrips.length){
        def.dayTrips.forEach(function(dt,j){
          var rid='edt_'+i+'_'+j;
          h+='<div class="dt-row" data-lat="'+(dt.lat||'')+'" data-lon="'+(dt.lon||'')+'">';
          h+='<div style="flex:1">';
          h+='<div style="display:flex;gap:6px;margin-bottom:8px">';
          h+='<div class="srch-wrap" style="flex:1"><input id="'+rid+'_n" class="dt-n" type="text" value="'+dt.name+'" placeholder="Day trip destination" oninput="srchInput(\''+rid+'_n\',\''+rid+'_dd\')" autocomplete="off"/><div id="'+rid+'_dd" class="srch-dd"></div></div>';
          h+='<input class="dt-d" type="date" value="'+dt.date+'" style="max-width:140px;min-height:48px"/>';
          h+='</div>';
          h+='<div class="fl2">';
          h+='<div><label class="flabel" style="font-size:10px">Depart time</label><input class="dt-depart" type="time" value="'+(dt.departTime||'')+'"/></div>';
          h+='<div><label class="flabel" style="font-size:10px">Return time</label><input class="dt-return" type="time" value="'+(dt.returnTime||'')+'"/></div>';
          h+='</div></div>';
          h+='<button class="icon-btn del" onclick="this.parentElement.remove()" type="button" style="align-self:flex-start">✕</button>';
          h+='</div>';
        });
      }
      h+='</div>';
      h+='<button onclick="addDtRow()" style="padding:10px 16px;border-radius:10px;border:1px dashed #ccc;background:transparent;font-size:14px;color:#888;margin-bottom:14px;min-height:44px;width:100%">+ Add day trip</button>';
      h+='<button onclick="saveCity('+i+')" style="width:100%;padding:14px;border-radius:10px;border:none;background:#0d2440;color:#fff;font-size:16px;font-weight:500;min-height:52px">Save changes</button>';
      h+='</div>';
    }
    h+='</div>';
  });
  h+='<div style="border-top:1px solid #e5e5e0;margin:1.5rem 0"></div>';
  h+='<div style="font-size:14px;font-weight:600;color:#1a1a1a;margin-bottom:14px">Add a city</div>';
  h+='<label class="flabel">Search city</label>';
  h+='<div class="srch-wrap" style="margin-bottom:10px"><input id="nc_n" type="text" placeholder="e.g. Matsuyama, Ehime…" oninput="srchInput(\'nc_n\',\'nc_n_dd\')" autocomplete="off"/><div id="nc_n_dd" class="srch-dd"></div></div>';
  h+='<div class="fl2" style="margin-bottom:10px">';
  h+='<div><label class="flabel">Country</label><input id="nc_co" type="text" placeholder="auto-filled by search"/></div>';
  h+='<div style="display:flex;flex-direction:column;justify-content:flex-end"><div style="font-size:11px;color:#0d2440;font-weight:500;text-transform:uppercase;letter-spacing:.05em;margin-bottom:6px">📍 Pin</div><div style="font-size:12px;color:#aaa;padding:12px 0">Select from dropdown</div></div>';
  h+='</div>';
  h+='<div class="fl2" style="margin-bottom:10px">';
  h+='<div><label class="flabel">Arrival date</label><input id="nc_f" type="date"/></div>';
  h+='<div><label class="flabel">Departure date</label><input id="nc_t" type="date"/></div>';
  h+='</div>';
  h+='<div style="margin-bottom:10px"><label class="flabel">Arrival time <span style="font-weight:400;color:#aaa">(optional)</span></label>';
  h+='<input id="nc_at" type="time" style="max-width:180px"/></div>';
  h+='<label class="flabel">Day trips <span style="font-weight:400;color:#aaa">(optional)</span></label>';
  h+='<div id="nc_dt_c"></div>';
  h+='<button onclick="addNcDtRow()" style="padding:10px 16px;border-radius:10px;border:1px dashed #ccc;background:transparent;font-size:14px;color:#888;margin-bottom:14px;min-height:44px;width:100%">+ Add day trip</button>';
  h+='<button onclick="addCity()" style="width:100%;padding:14px;border-radius:10px;border:1px solid #0d2440;background:transparent;color:#0d2440;font-size:16px;font-weight:500;min-height:52px">+ Add to itinerary</button>';
  h+='</div>';
  document.getElementById('root').innerHTML=h;
}

if('serviceWorker'in navigator){window.addEventListener('load',function(){navigator.serviceWorker.register('./sw.js').catch(function(e){console.log('SW:',e);});});}
init();
</script>
